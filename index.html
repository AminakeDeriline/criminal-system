<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falcon Shield - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .login-container {
            background: rgba(18, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            border: 1px solid #2a3456;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 600;
            background: linear-gradient(135deg, #e6e9ff, #9aa8d9);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #7c89b0;
            font-size: 0.75rem;
            margin-top: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #95a5cf;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            background: #070c1a;
            border: 1px solid #2e3c60;
            padding: 12px 16px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus {
            border-color: #5f7ec9;
            box-shadow: 0 0 0 2px rgba(79, 114, 189, 0.4);
        }

        .login-btn {
            width: 100%;
            background: #3b5b8c;
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }

        .login-btn:hover {
            background: #4d71a8;
            transform: scale(0.98);
        }

        .error-message {
            color: #e06c75;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }

        .security-note {
            text-align: center;
            margin-top: 1.5rem;
            color: #56658b;
            font-size: 0.7rem;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: #56658b;
            font-size: 0.7rem;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo">
            <h1>⚡ FALCON SHIELD</h1>
            <p>CRIMINAL DATABASE · RESTRICTED ACCESS</p>
        </div>
        <form action="connect.php" method="POST">

            <div class="input-group">
                <label>👮 OFFICER NAME</label>
                <input type="text" id="officerName" placeholder="Enter your name" name="name">
            </div>
            <div class="input-group">
                <label>🔒 ACCESS PASSWORD</label>
                <input type="password" id="officerPass" placeholder="Enter password">
            </div>
            <button class="login-btn" id="loginBtn">🔑 LOGIN TO SYSTEM</button>
        </form>

        <div class="error-message" id="errorMsg">❌ Invalid credentials. Access denied.</div>
        <div class="security-note">🔐 Secure system. Authorized personnel only.</div>
        <footer>Classified LEADS System</footer>
    </div>

    <script>
        const MASTER_PASSWORD = "falcon123";

        document.getElementById("loginBtn").addEventListener("click", function () {
            const name = document.getElementById("officerName").value.trim();
            const pass = document.getElementById("officerPass").value;
            const errorMsg = document.getElementById("errorMsg");

            if (pass === MASTER_PASSWORD && name !== "") {
                localStorage.setItem("loggedInOfficer", name);
                window.location.href = "dashboard.html";
            } else {
                errorMsg.style.display = "block";
                setTimeout(() => {
                    errorMsg.style.display = "none";
                }, 3000);
            }
        });

        document.getElementById("officerPass").addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                document.getElementById("loginBtn").click();
            }
        });
    </script>
</body>

</html>
